<script>
        // PEGA AQUÍ LA URL DE TU WORKER DE CLOUDFLARE (la que copiaste en el paso 7)
        const MY_WORKER_URL = "https://steamdeals.mozz05.workers.dev/?url="; 
        
        async function startTracking() {
            const steamId = document.getElementById('steamId').value;
            const resultsDiv = document.getElementById('results');
            const statusDiv = document.getElementById('status');
            
            resultsDiv.innerHTML = '';
            statusDiv.innerText = 'Conectando con Steam mediante tu Worker...';

            try {
                // Construimos la URL usando TU Worker
                const steamUrl = `https://store.steampowered.com/wishlist/profiles/${steamId}/wishlistdata/`;
                const fetchUrl = MY_WORKER_URL + encodeURIComponent(steamUrl);
                
                const wishlistResponse = await fetch(fetchUrl);
                
                if (!wishlistResponse.ok) {
                    throw new Error("El Worker no pudo conectar con Steam. ¿Es público el perfil?");
                }

                // Como nuestro Worker ya devuelve el JSON limpio, no hay que hacer JSON.parse(contents)
                const wishlistData = await wishlistResponse.json();

                if (!wishlistData || Object.keys(wishlistData).length === 0) {
                    throw new Error("Wishlist vacía o perfil privado. Revisa que tu perfil sea Público.");
                }

                statusDiv.innerText = 'Wishlist cargada. Buscando descuentos...';
                let dealsFound = 0;

                for (const appId in wishlistData) {
                    const game = wishlistData[appId];
                    const subs = game.subs;

                    if (subs && subs.length > 0 && subs[0].discount_pct > 0) {
                        dealsFound++;
                        const steamPrice = (subs[0].price / 100).toFixed(2);
                        const originalPrice = (subs[0].price / (1 - subs[0].discount_pct/100)).toFixed(2);

                        statusDiv.innerText = `Analizando: ${game.name}...`;

                        // CheapShark sigue funcionando perfecto desde el frontend
                        const cheapSharkUrl = `https://www.cheapshark.com/api/1.0/deals?storeID=1&steamAppID=${appId}`;
                        const csResponse = await fetch(cheapSharkUrl);
                        const csData = await csResponse.json();

                        if (csData.length > 0) {
                            const deal = csData[0];
                            const lowestEver = deal.lowestPrice;
                            const isLowest = parseFloat(steamPrice) <= parseFloat(lowestEver);

                            const card = document.createElement('div');
                            card.className = 'card';
                            card.innerHTML = `
                                <div class="game-info">
                                    <div class="game-title">${game.name}</div>
                                    <span class="original-price">$${originalPrice}</span>
                                    <span class="price-tag">$${steamPrice}</span>
                                    <span>(-${subs[0].discount_pct}%)</span>
                                    <div class="lowest">
                                        Mínimo histórico: $${lowestEver} 
                                        ${isLowest ? '⭐ ¡ES EL MÍNIMO HISTÓRICO!' : ''}
                                    </div>
                                </div>
                                <div class="chart-container">
                                    <canvas id="chart-${appId}"></canvas>
                                </div>
                            `;
                            resultsDiv.appendChild(card);

                            createTimelineChart(appId, game.name, steamPrice, lowestEver, originalPrice);
                        }
                        await new Promise(r => setTimeout(r, 300));
                    }
                }
                
                statusDiv.innerText = dealsFound > 0 ? `✅ Se encontraron ${dealsFound} juegos en oferta.` : 'Ningún juego de tu wishlist está en oferta ahora mismo.';

            } catch (error) {
                statusDiv.innerHTML = `<span style="color: #ff0000;">Error: ${error.message}</span>`;
                console.error(error);
            }
        }

        function createTimelineChart(appId, name, currentPrice, lowestPrice, originalPrice) {
            const ctx = document.getElementById(`chart-${appId}`).getContext('2d');
            
            const labels = ['Lanzamiento', 'Rebaja Anterior', 'Mínimo Histórico', 'Precio Actual'];
            const dataPoints = [
                parseFloat(originalPrice), 
                (parseFloat(originalPrice) + parseFloat(lowestPrice)) / 2, 
                parseFloat(lowestPrice), 
                parseFloat(currentPrice)
            ];

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Precio (USD)',
                        data: dataPoints,
                        borderColor: '#66c0f4',
                        backgroundColor: 'rgba(102, 192, 244, 0.1)',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { 
                            ticks: { color: '#c7d5e0', callback: value => '$' + value },
                            grid: { color: '#3d5575' }
                        },
                        x: { 
                            ticks: { color: '#c7d5e0' },
                            grid: { color: '#3d5575' }
                        }
                    }
                }
            });
        }
    </script>
