        // ── Parse imported JSON (Augmented Steam format) ──
        // Soporta múltiples formatos:
        // 1) Objeto plano: { "12345": { "name": "...", "discount": 50, ... }, ... }
        // 2) Array: [ { "appid": 12345, "name": "...", ... }, ... ]
        // 3) Wrapper: { "data": { "12345": { ... } } } o { "wishlist": { ... } }
        // 4) Wrapper: { "data": [ { ... } ] } o { "wishlist": [ ... ] }
        function parseImportedJson(jsonStr) {
            let data;
            try {
                data = JSON.parse(jsonStr);
            } catch (e) {
                return { error: 'JSON inválido. Verificá que hayas copiado todo el JSON correctamente.' };
            }

            // Buscar games recursivamente si hay wrappers
            function extractGames(obj) {
                if (Array.isArray(obj)) return obj;
                if (typeof obj !== 'object' || obj === null) return [];

                // Si es un objeto donde TODAS las keys son numéricas → es el formato
                // directo de Augmented Steam (keys = appIds)
                const keys = Object.keys(obj);
                const numericKeys = keys.filter(k => /^\d+$/.test(k));

                if (numericKeys.length > 1 && numericKeys.length >= keys.length * 0.8) {
                    // Más del 80% de keys son numéricas → formato directo
                    const games = [];
                    for (const [key, value] of Object.entries(obj)) {
                        if (value && typeof value === 'object' && value.name) {
                            games.push({ ...value, _key: key });
                        }
                    }
                    if (games.length > 1) return games;
                }

                // Buscar wrappers comunes
                const wrapperKeys = ['data', 'wishlist', 'items', 'games', 'results', 'response'];
                for (const wk of wrapperKeys) {
                    if (obj[wk] && typeof obj[wk] === 'object') {
                        const nested = extractGames(obj[wk]);
                        if (nested.length > 0) return nested;
                    }
                }

                // Si no encontramos wrappers, iterar entries como último recurso
                const games = [];
                for (const [key, value] of Object.entries(obj)) {
                    if (value && typeof value === 'object') {
                        if (value.name && (value.discount !== undefined || value.price !== undefined)) {
                            games.push({ ...value, _key: key });
                        }
                    }
                }
                return games;
            }

            const games = extractGames(data);

            if (games.length === 0) {
                console.error('parseImportedJson: no se encontraron juegos. Top-level keys:', Object.keys(data).slice(0, 10));
                return { error: `No se encontraron juegos en el JSON (encontré ${Object.keys(data).length} keys top-level). Verificá que copiaste todo el JSON de Augmented Steam.` };
            }

            // Normalizar campos
            const normalized = games.map(g => {
                // El appId puede venir de: campo appid/appId, la key numérica, o subid
                const rawId = g.appid || g.appId || g._key || g.subid || '';
                const appId = String(rawId).trim();
                if (!appId || appId === 'undefined' || appId === 'null') return null;

                // Solo procesar entries que parezcan juegos (tienen name)
                if (!g.name) return null;

                const discount = Number(g.discount) || Number(g.discount_percent) || Number(g.discountPercent) || 0;
                const price = Number(g.price) || Number(g.final_price) || Number(g.finalPrice) || 0;
                const originalPrice = Number(g.original_price) || Number(g.originalPrice) || Number(g.initial_price) || 0;
                const currency = g.currency || 'USD';
                const name = g.name;

                return {
                    appId,
                    name,
                    discount_percent: discount,
                    final_price: price,
                    original_price: originalPrice,
                    currency
                };
            }).filter(g => g !== null);

            console.log(`parseImportedJson: ${normalized.length} juegos parseados de ${games.length} entries`);

            if (normalized.length === 0) {
                return { error: 'No se pudieron extraer juegos válidos. El JSON no contiene campos reconocibles (name, discount/price).' };
            }

            return { games: normalized };
        }

        // ── Process imported JSON: filtrar ofertas y enriquecer ──
        async function processImportedJson() {
            const jsonStr = document.getElementById('importJsonInput').value.trim();
            const errorEl = document.getElementById('importError');
            const steamId = document.getElementById('steamIdInput').value;
            const apiKey = document.getElementById('apiKeyInput').value;
            const cc = document.getElementById('countryInput').value.toLowerCase() || 'us';
            const resultsDiv = document.getElementById('results');
            const statusDiv = document.getElementById('status');
            const progressBar = document.getElementById('progress-bar');
            const progressContainer = document.getElementById('progress-container');
            const toolbar = document.getElementById('toolbar');

            // Validar
            if (!jsonStr) {
                errorEl.textContent = 'Pegá el JSON de Augmented Steam acá primero.';
                errorEl.style.display = 'block';
                return;
            }

            const parsed = parseImportedJson(jsonStr);
            if (parsed.error) {
                errorEl.textContent = parsed.error;
                errorEl.style.display = 'block';
                return;
            }

            errorEl.style.display = 'none';
            hideImportPanel();

            // Cache previo para comparar
            const cachedDeals = getDealsCache();
            const prevDeals = cachedDeals && cachedDeals.steamId === steamId && cachedDeals.country === cc
                ? [...cachedDeals.deals]
                : (allDeals.length > 0 ? [...allDeals] : null);

            const games = parsed.games;
            const totalGames = games.length;

            // Filtrar juegos en oferta
            const discountedGames = games.filter(g => g.discount_percent > 0);
            const discountedAppIds = discountedGames.map(g => g.appId);

            // Mapa rápido para lookup
            const wlMap = {};
            games.forEach(g => wlMap[g.appId] = g);

            // Mostrar progreso
            progressContainer.style.display = 'block';
            progressBar.style.width = '5%';
            progressBar.innerText = '5%';
            statusDiv.innerText = `Wishlist importada: ${totalGames} juegos. ${discountedAppIds.length} en oferta.`;

            if (discountedAppIds.length === 0) {
                allDeals = [];
                resultsDiv.innerHTML = '';
                progressContainer.style.display = 'none';
                toolbar.classList.remove('visible');
                setDealsCache([]);
                if (prevDeals && prevDeals.length > 0) compareAndNotify(prevDeals, []);
                statusDiv.innerText = `${totalGames} juegos en wishlist. Ninguno está en oferta.`;
                return;
            }

            progressBar.style.width = '15%';
            progressBar.innerText = '15%';

            // ── Enriquecer: appdetails (precio regional) + CheapShark + Reviews ──
            const lots = chunkArray(discountedAppIds, 8);
            const freshDeals = [];
            const failedAppIdsPerBatch = [];

            statusDiv.innerText = `Enriqueciendo ${discountedAppIds.length} juegos en oferta...`;

            for (let i = 0; i < lots.length; i++) {
                const pct = 15 + Math.round(((i + 1) / lots.length) * 70);
                progressBar.style.width = pct + '%';
                progressBar.innerText = pct + '%';
                statusDiv.innerText = `Lote ${i + 1}/${lots.length} (${discountedAppIds.length} en oferta)...`;

                try {
                    const dealsUrl = `${WORKER_URL}?mode=deals&appids=${lots[i].join(',')}&cc=${cc}`;
                    const dealsRes = await fetch(dealsUrl);
                    if (dealsRes.ok) {
                        const data = await dealsRes.json();
                        freshDeals.push(...(data.deals || []));
                        failedAppIdsPerBatch.push(...(data.failedAppIds || []));
                    }
                } catch (batchErr) {
                    console.error(`Lote ${i + 1} error:`, batchErr);
                }
                if (i < lots.length - 1) await new Promise(r => setTimeout(r, 500));
            }

            // Mapa de deals enriquecidos
            const enrichedMap = new Map(freshDeals.map(d => [String(d.appId), d]));

            // Swap
            allDeals = freshDeals;
            resultsDiv.innerHTML = '';
            if (allDeals.length > 0) {
                toolbar.classList.add('visible');
                document.getElementById('searchInput').value = '';
                document.getElementById('sortSelect').value = 'discount-desc';
                document.getElementById('minDiscountInput').value = '0';
                document.getElementById('minDiscountValue').textContent = '0';
                allDeals.forEach(deal => resultsDiv.appendChild(buildCard(deal)));
                updateCount();
                updateCartUI();
            }
            progressBar.style.width = '90%';
            progressBar.innerText = '90%';
            progressContainer.style.display = 'none';

            // Retry cascade
            const retryTargets = failedAppIdsPerBatch.filter(id => !enrichedMap.has(String(id)));
            if (retryTargets.length > 0) {
                const { totalRetryDeals, stillFailed } = await runRetryCascade(retryTargets, cc);
                allDeals.forEach(d => enrichedMap.set(String(d.appId), d));
            }

            // Fallback: cards básicos para juegos que no se pudieron enriquecer
            let fallbackCount = 0;
            for (const appId of discountedAppIds) {
                if (!enrichedMap.has(String(appId))) {
                    const info = wlMap[appId];
                    if (info) {
                        const fallbackDeal = {
                            appId: appId,
                            name: info.name || 'Desconocido',
                            steamPrice: (info.final_price / 100).toFixed(2),
                            originalPrice: (info.original_price / 100).toFixed(2),
                            discount: info.discount_percent,
                            currency: info.currency || 'USD',
                            lowestEverUsd: null,
                            maxDiscountUs: null,
                            reviewScore: null,
                            reviewLabel: ''
                        };
                        allDeals.push(fallbackDeal);
                        enrichedMap.set(String(appId), fallbackDeal);
                        const card = buildCard(fallbackDeal);
                        resultsDiv.appendChild(card);
                        fallbackCount++;
                    }
                }
            }
            if (fallbackCount > 0) {
                updateCount();
                updateCartUI();
            }

            // Guardar cache + notificar cambios
            setDealsCache(allDeals);
            if (prevDeals && prevDeals.length > 0) {
                compareAndNotify(prevDeals, allDeals);
            }

            statusDiv.innerText = `${discountedAppIds.length} juegos en oferta (importados).${fallbackCount > 0 ? ` (${fallbackCount} sin precio regional)` : ''}`;
        }

        async function startTracking() {
            const steamId = document.getElementById('steamIdInput').value;
            const apiKey = document.getElementById('apiKeyInput').value;
            const cc = document.getElementById('countryInput').value.toLowerCase() || 'us';
            const resultsDiv = document.getElementById('results');
            const statusDiv = document.getElementById('status');
            const progressBar = document.getElementById('progress-bar');
            const progressContainer = document.getElementById('progress-container');
            const toolbar = document.getElementById('toolbar');

            if (!steamId) {
                statusDiv.innerText = "⚠️ Ingresá tu Steam ID para continuar.";
                return;
            }

            localStorage.setItem('steamId', steamId);
            if (apiKey) localStorage.setItem('steamApiKey', apiKey);
            localStorage.setItem('steamCountry', cc);

            // ── Cache ──
            const cachedDeals = getDealsCache();
            const hasCache = isCacheFresh(cachedDeals) && cachedDeals.steamId === steamId && cachedDeals.country === cc;
            const prevDeals = hasCache ? [...cachedDeals.deals] : null;
            if (hasCache) {
                showCachedResults(cachedDeals);
            } else {
                resultsDiv.innerHTML = '';
                allDeals = [];
                toolbar.classList.remove('visible');
            }

            progressContainer.style.display = 'block';
            progressBar.style.width = '0%';
            progressBar.innerText = '0%';
            hideImportPanel(); // Limpiar panel de importación previo
            if (!hasCache) {
                statusDiv.innerText = 'Obteniendo datos de wishlist...';
            } else {
                statusDiv.innerHTML = `<span style="color: var(--warn)">Mostrando datos cacheados. Actualizando en background...</span>`;
            }

            try {
                // ══════════════════════════════════════════════════════════════
                // TRY 0: SCRAPE — extrae appids del HTML de la wishlist pública
                // No necesita API key. Funciona con vanity ID o Steam64 ID.
                // Si fue bloqueado esta sesión, lo saltamos directamente.
                // ══════════════════════════════════════════════════════════════
                let scrapedAppIds = null;
                const scrapeBlockedKey = 'scrape_blocked';
                const wasScrapeBlocked = sessionStorage.getItem(scrapeBlockedKey) === 'true';

                if (!wasScrapeBlocked) {
                    try {
                        statusDiv.innerText = 'Obteniendo wishlist (scraping HTML)...';
                        const scrapeUrl = `${WORKER_URL}?mode=scrape&profile=${encodeURIComponent(steamId)}`;
                        const scrapeRes = await fetch(scrapeUrl);
                        const scrapeData = await scrapeRes.json();

                        if (Array.isArray(scrapeData) && scrapeData.length > 0) {
                            scrapedAppIds = scrapeData;
                            console.log(`✅ Scrape exitoso: ${scrapedAppIds.length} appids`);
                        } else if (scrapeData && scrapeData.rate_limited) {
                            // 429 = rate limit temporal → reintentar una vez después de N segundos
                            const retrySec = scrapeData.retry_after || 5;
                            console.warn(`⚠️ Scrape rate-limited (429). Reintentando en ${retrySec}s...`);
                            statusDiv.innerText = `Scrape rate-limited. Reintentando en ${retrySec}s...`;
                            await new Promise(r => setTimeout(r, retrySec * 1000));
                            try {
                                statusDiv.innerText = 'Reintentando scrape...';
                                const retryRes = await fetch(scrapeUrl);
                                const retryData = await retryRes.json();
                                if (Array.isArray(retryData) && retryData.length > 0) {
                                    scrapedAppIds = retryData;
                                    console.log(`✅ Scrape retry exitoso: ${scrapedAppIds.length} appids`);
                                } else {
                                    console.warn(`⚠️ Scrape retry también falló. Usando siguiente método.`);
                                }
                            } catch (retryErr) {
                                console.warn('⚠️ Scrape retry error:', retryErr.message);
                            }
                        } else if (scrapeData && scrapeData.blocked) {
                            // Bloqueo permanente (403, 404, etc.) → marcar para no reintentar
                            sessionStorage.setItem(scrapeBlockedKey, 'true');
                            console.warn(`⚠️ Scrape bloqueado (${scrapeData.error}). Usando siguiente método.`);
                        }
                    } catch (scrapeErr) {
                        console.warn('⚠️ Scrape falló:', scrapeErr.message);
                    }
                } else {
                    console.log('⏭️ Scrape bloqueado esta sesión, saltando.');
                }

                // Si scrape tuvo éxito → enrich con appdetails + CheapShark + Reviews
                if (scrapedAppIds && scrapedAppIds.length > 0) {
                    statusDiv.innerText = `${scrapedAppIds.length} juegos en wishlist (scrape). Buscando ofertas en ${cc.toUpperCase()}...`;

                    const lotes = chunkArray(scrapedAppIds, 8);
                    const freshDeals = [];
                    const failedAppIdsPerBatch = [];

                    for (let i = 0; i < lotes.length; i++) {
                        const porcentaje = Math.round(((i + 1) / lotes.length) * 100);
                        progressBar.style.width = porcentaje + '%';
                        progressBar.innerText = porcentaje + '%';
                        statusDiv.innerText = `Analizando lote ${i + 1} de ${lotes.length} (scrape)...`;

                        try {
                            const dealsUrl = `${WORKER_URL}?mode=deals&appids=${lotes[i].join(',')}&cc=${cc}`;
                            const dealsRes = await fetch(dealsUrl);
                            if (dealsRes.ok) {
                                const data = await dealsRes.json();
                                freshDeals.push(...(data.deals || []));
                                failedAppIdsPerBatch.push(...(data.failedAppIds || []));
                            }
                        } catch (batchErr) {
                            console.error(`Lote ${i + 1} error:`, batchErr);
                        }
                        if (i < lotes.length - 1) await new Promise(r => setTimeout(r, 500));
                    }

                    allDeals = freshDeals;
                    resultsDiv.innerHTML = '';
                    if (allDeals.length > 0) {
                        toolbar.classList.add('visible');
                        document.getElementById('searchInput').value = '';
                        document.getElementById('sortSelect').value = 'discount-desc';
                        document.getElementById('minDiscountInput').value = '0';
                        document.getElementById('minDiscountValue').textContent = '0';
                        allDeals.forEach(deal => resultsDiv.appendChild(buildCard(deal)));
                        updateCount();
                        updateCartUI();
                    }
                    progressContainer.style.display = 'none';

                    if (failedAppIdsPerBatch.length > 0) {
                        await runRetryCascade(failedAppIdsPerBatch, cc);
                    }

                    setDealsCache(allDeals);
                    if (prevDeals && prevDeals.length > 0) {
                        compareAndNotify(prevDeals, allDeals);
                    }

                    if (allDeals.length > 0) {
                        statusDiv.innerText = `Búsqueda completada (scrape). ${allDeals.length} juegos en oferta.`;
                    } else {
                        statusDiv.innerText = 'Búsqueda completada (scrape). Ningún juego está en oferta ahora mismo.';
                    }
                    return; // ✅ Scrape path completado
                }

                // ══════════════════════════════════════════════════════════════
                // TRY wishlistdata via worker (1 request → full wishlist + prices)
                // Steam bloquea IPs de cloud → 503. Si fue bloqueado esta sesión,
                // lo recordamos en sessionStorage para no reintentar inútilmente.
                // ══════════════════════════════════════════════════════════════
                let wlDataBody = null;
                const wlBlockedKey = `wlBlocked_${steamId}`;
                const wasWlBlocked = sessionStorage.getItem(wlBlockedKey) === 'true';

                if (!wasWlBlocked) {
                    try {
                        const wlDataUrl = `${WORKER_URL}?mode=wishlistdata&steamid=${steamId}&cc=${cc}`;
                        const wlDataRes = await fetch(wlDataUrl);

                        if (wlDataRes.ok) {
                            wlDataBody = await wlDataRes.json();
                            console.log(`Wishlistdata OK: ${wlDataBody.totalGames || '?'} juegos`);
                        } else if (wlDataRes.status === 503) {
                            const errData = await wlDataRes.json().catch(() => ({}));
                            if (errData.blocked) {
                                sessionStorage.setItem(wlBlockedKey, 'true');
                                console.warn('Steam bloqueó wishlistdata (IP de cloud). Usando fallback.');
                            }
                        }
                    } catch (wlErr) {
                        console.error('Wishlistdata error:', wlErr.message);
                    }
                } else {
                    console.log('Wishlistdata ya fue bloqueado esta sesión, saltando al fallback.');
                }

                if (wlDataBody && wlDataBody.games && Array.isArray(wlDataBody.games) && wlDataBody.games.length > 0) {
                    const totalGames = wlDataBody.totalGames || wlDataBody.games.length;

                    // Filtrar juegos en oferta
                    const discountedGames = wlDataBody.games.filter(g => g.discount_percent > 0);
                    const discountedAppIds = discountedGames.map(g => g.appId);

                    // Mapa rápido para lookup por appId
                    const wlMap = {};
                    wlDataBody.games.forEach(g => wlMap[g.appId] = g);

                    statusDiv.innerText = `${totalGames} juegos en wishlist. ${discountedAppIds.length} en oferta.`;
                    progressBar.style.width = '15%';
                    progressBar.innerText = '15%';

                    if (discountedAppIds.length === 0) {
                        // No hay ofertas — respuesta definitiva, no se necesita buscar más
                        allDeals = [];
                        resultsDiv.innerHTML = '';
                        progressContainer.style.display = 'none';
                        toolbar.classList.remove('visible');
                        setDealsCache([]);
                        if (prevDeals && prevDeals.length > 0) compareAndNotify(prevDeals, []);
                        statusDiv.innerText = `${totalGames} juegos en wishlist. Ninguno está en oferta.`;
                        return;
                    }

                    // ── Enriquecer: appdetails (precio regional ARS) + CheapShark + Reviews ──
                    // Solo procesamos los juegos que están en oferta (~80 vs 360 antes)
                    const lots = chunkArray(discountedAppIds, 8);
                    const freshDeals = [];
                    const failedAppIdsPerBatch = [];

                    statusDiv.innerText = `Obteniendo detalles para ${discountedAppIds.length} juegos en oferta...`;

                    for (let i = 0; i < lots.length; i++) {
                        const pct = 15 + Math.round(((i + 1) / lots.length) * 70);
                        progressBar.style.width = pct + '%';
                        progressBar.innerText = pct + '%';
                        statusDiv.innerText = `Enriqueciendo lote ${i + 1} de ${lots.length} (${discountedAppIds.length} en oferta)...`;

                        try {
                            const dealsUrl = `${WORKER_URL}?mode=deals&appids=${lots[i].join(',')}&cc=${cc}`;
                            const dealsRes = await fetch(dealsUrl);
                            if (dealsRes.ok) {
                                const data = await dealsRes.json();
                                freshDeals.push(...(data.deals || []));
                                failedAppIdsPerBatch.push(...(data.failedAppIds || []));
                            }
                        } catch (batchErr) {
                            console.error(`Lote ${i + 1} error:`, batchErr);
                        }
                        if (i < lots.length - 1) await new Promise(r => setTimeout(r, 500));
                    }

                    // Mapa de deals enriquecidos
                    const enrichedMap = new Map(freshDeals.map(d => [String(d.appId), d]));

                    // ── Swap: reemplazar cache con resultados enriquecidos ──
                    allDeals = freshDeals;
                    resultsDiv.innerHTML = '';
                    if (allDeals.length > 0) {
                        toolbar.classList.add('visible');
                        document.getElementById('searchInput').value = '';
                        document.getElementById('sortSelect').value = 'discount-desc';
                        document.getElementById('minDiscountInput').value = '0';
                        document.getElementById('minDiscountValue').textContent = '0';
                        allDeals.forEach(deal => resultsDiv.appendChild(buildCard(deal)));
                        updateCount();
                        updateCartUI();
                    }
                    progressBar.style.width = '90%';
                    progressBar.innerText = '90%';
                    progressContainer.style.display = 'none';

                    // ── Retry cascade (solo juegos que fallaron el enriquecimiento) ──
                    const retryTargets = failedAppIdsPerBatch.filter(id => !enrichedMap.has(String(id)));
                    if (retryTargets.length > 0) {
                        const { totalRetryDeals, stillFailed } = await runRetryCascade(retryTargets, cc);
                        // Agregar deals recuperados al enrichedMap
                        allDeals.forEach(d => enrichedMap.set(String(d.appId), d));
                    }

                    // ── Fallback: cards básicos para juegos que no se pudieron enriquecer ──
                    // Usamos datos del wishlistdata (nombre + descuento + precio USD)
                    let fallbackCount = 0;
                    for (const appId of discountedAppIds) {
                        if (!enrichedMap.has(String(appId))) {
                            const info = wlMap[appId];
                            if (info) {
                                const fallbackDeal = {
                                    appId: appId,
                                    name: info.name || 'Desconocido',
                                    steamPrice: (info.final_price / 100).toFixed(2),
                                    originalPrice: (info.original_price / 100).toFixed(2),
                                    discount: info.discount_percent,
                                    currency: info.currency || 'USD',
                                    lowestEverUsd: null,
                                    maxDiscountUs: null,
                                    reviewScore: null,
                                    reviewLabel: ''
                                };
                                allDeals.push(fallbackDeal);
                                enrichedMap.set(String(appId), fallbackDeal);
                                const card = buildCard(fallbackDeal);
                                resultsDiv.appendChild(card);
                                fallbackCount++;
                            }
                        }
                    }
                    if (fallbackCount > 0) {
                        updateCount();
                        updateCartUI();
                    }

                    // ── Guardar cache + notificar cambios ──
                    setDealsCache(allDeals);
                    if (prevDeals && prevDeals.length > 0) {
                        compareAndNotify(prevDeals, allDeals);
                    }

                    statusDiv.innerText = `${discountedAppIds.length} juegos en oferta.${fallbackCount > 0 ? ` (${fallbackCount} sin precio regional)` : ''}`;
                    return; // ✅ Fast path completado
                }

                // ══════════════════════════════════════════════════════════════
                // FALLBACK: Wishlist API + per-game deals
                // Se usa si: wishlistdata fue bloqueado (503) o devolvió vacío.
                // ══════════════════════════════════════════════════════════════
                if (!apiKey) {
                    progressContainer.style.display = 'none';
                    statusDiv.innerText = '';
                    showImportPanel({ prevDeals, cc, steamId });
                    return;
                }

                console.log('Usando fallback: Wishlist API + batch deals...');
                statusDiv.innerText = 'Obteniendo tu wishlist (método alternativo)...';

                const wishlistUrl = `${WORKER_URL}?mode=wishlist&steamid=${steamId}&apikey=${apiKey}`;
                const wishlistRes = await fetch(wishlistUrl);

                if (!wishlistRes.ok) throw new Error("Error obteniendo la wishlist.");

                const appIds = await wishlistRes.json();

                if (appIds.length === 0) {
                    statusDiv.innerText = "Wishlist vacía o perfil privado.";
                    progressContainer.style.display = 'none';
                    return;
                }

                statusDiv.innerText = `Se encontraron ${appIds.length} juegos. Buscando ofertas en ${cc.toUpperCase()}...`;

                const lotes = chunkArray(appIds, 8);
                const freshDeals = [];
                const failedAppIdsPerBatch = [];

                for (let i = 0; i < lotes.length; i++) {
                    const porcentaje = Math.round(((i + 1) / lotes.length) * 100);
                    progressBar.style.width = porcentaje + '%';
                    progressBar.innerText = porcentaje + '%';
                    statusDiv.innerText = `Analizando lote ${i + 1} de ${lotes.length}...`;

                    try {
                        const dealsUrl = `${WORKER_URL}?mode=deals&appids=${lotes[i].join(',')}&cc=${cc}`;
                        const dealsRes = await fetch(dealsUrl);

                        if (dealsRes.ok) {
                            const data = await dealsRes.json();
                            const deals = data.deals || [];
                            const batchFailed = data.failedAppIds || [];
                            failedAppIdsPerBatch.push(...batchFailed);
                            freshDeals.push(...deals);
                        }
                    } catch (batchErr) {
                        console.error(`Error en lote ${i + 1}:`, batchErr);
                    }

                    if (i < lotes.length - 1) await new Promise(r => setTimeout(r, 500));
                }

                allDeals = freshDeals;
                resultsDiv.innerHTML = '';
                if (allDeals.length > 0) {
                    toolbar.classList.add('visible');
                    document.getElementById('searchInput').value = '';
                    document.getElementById('sortSelect').value = 'discount-desc';
                    document.getElementById('minDiscountInput').value = '0';
                    document.getElementById('minDiscountValue').textContent = '0';
                    allDeals.forEach(deal => resultsDiv.appendChild(buildCard(deal)));
                    updateCount();
                    updateCartUI();
                }
                progressContainer.style.display = 'none';

                if (failedAppIdsPerBatch.length > 0) {
                    await runRetryCascade(failedAppIdsPerBatch, cc);
                }

                setDealsCache(allDeals);

                if (prevDeals && prevDeals.length > 0) {
                    compareAndNotify(prevDeals, allDeals);
                }

                if (allDeals.length > 0) {
                    statusDiv.innerText = `Búsqueda completada. ${allDeals.length} juegos en oferta.`;
                } else {
                    statusDiv.innerText = 'Búsqueda completada. Ningún juego está en oferta ahora mismo.';
                }

            } catch (error) {
                statusDiv.innerHTML = `<span style="color: var(--danger);">Error: ${error.message}</span>`;
                console.error(error);
                progressContainer.style.display = 'none';
            }
        }

        function updateCount() {
            const filtered = getFilteredSorted();
            document.getElementById('toolbar-count').innerHTML =
                `<strong>${filtered.length}</strong> de ${allDeals.length} juegos`;
        }

        function renderDeals() {
            const resultsDiv = document.getElementById('results');
            const filtered = getFilteredSorted();

            resultsDiv.innerHTML = '';

            document.getElementById('toolbar-count').innerHTML =
                `<strong>${filtered.length}</strong> de ${allDeals.length} juegos`;

            if (filtered.length === 0) {
                resultsDiv.innerHTML = '<div class="no-results">No se encontraron juegos con esos filtros.</div>';
                return;
            }

            filtered.forEach(deal => {
                const card = buildCard(deal);
                resultsDiv.appendChild(card);
            });
        }
    </script>
</body>
</html>
