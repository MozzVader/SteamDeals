<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Wishlist Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #1b2838;
            color: #c7d5e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .header { text-align: center; margin-bottom: 30px; }
        input {
            padding: 10px; width: 300px; border-radius: 5px;
            border: none; background: #2a475e; color: white; font-size: 16px;
        }
        button {
            padding: 10px 20px; border-radius: 5px; border: none;
            background: #66c0f4; color: #1b2838; font-weight: bold; cursor: pointer; font-size: 16px;
        }
        button:hover { background: #a4d007; }
        .card {
            background: #2a475e; border-radius: 8px; padding: 15px;
            margin-bottom: 20px; display: flex; gap: 20px; align-items: center;
        }
        .game-info { flex: 1; }
        .game-title { color: #66c0f4; font-size: 1.2rem; font-weight: bold; }
        .price-tag { font-size: 1.5rem; color: #a4d007; }
        .original-price { text-decoration: line-through; color: #626366; font-size: 1rem; }
        .lowest { color: #f0ad4e; font-size: 0.9rem; margin-top: 5px; }
        .chart-container { flex: 1; min-width: 300px; height: 150px; }
        #status { text-align: center; color: #66c0f4; font-style: italic; margin-bottom: 20px; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🎮 Mi Wishlist en Oferta</h1>
        <input type="text" id="steamId" value="76561198043893385" placeholder="Pega tu Steam64 ID aquí">
        <button onclick="startTracking()">Buscar Ofertas</button>
    </div>
    
    <div id="status">Pulsa el botón para buscar</div>
    <div id="results"></div>

    <script>
        // PEGA AQUÍ LA URL DE TU WORKER (DEBE TERMINAR EN ?steamid=)
        const MY_WORKER_URL = "https://steamdeals.mozz05.workers.dev/?steamid="; 
        
        async function startTracking() {
            const steamId = document.getElementById('steamId').value;
            const resultsDiv = document.getElementById('results');
            const statusDiv = document.getElementById('status');
            
            resultsDiv.innerHTML = '';
            statusDiv.innerText = 'Leyendo tu Wishlist desde la Comunidad de Steam...';

            try {
                // 1. Obtenemos los IDs de la wishlist desde el Worker
                const fetchUrl = MY_WORKER_URL + steamId;
                const response = await fetch(fetchUrl);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText);
                }

                const appIds = await response.json();

                if (!appIds || appIds.length === 0) {
                    throw new Error("No se encontraron juegos o el perfil es privado.");
                }

                statusDiv.innerText = `Se encontraron ${appIds.length} juegos. Buscando cuáles están en oferta...`;
                let dealsFound = 0;

                // 2. Revisamos cada juego en CheapShark
                for (const appId of appIds) {
                    const cheapSharkUrl = `https://www.cheapshark.com/api/1.0/deals?storeID=1&steamAppID=${appId}`;
                    const csResponse = await fetch(cheapSharkUrl);
                    const csData = await csResponse.json();

                    // Si CheapShark tiene datos y el juego está en descuento
                    if (csData.length > 0 && parseInt(csData[0].savings) > 0) {
                        const deal = csData[0];
                        dealsFound++;
                        
                        const name = deal.title;
                        const steamPrice = parseFloat(deal.salePrice).toFixed(2);
                        const originalPrice = parseFloat(deal.normalPrice).toFixed(2);
                        const lowestEver = parseFloat(deal.lowestPrice).toFixed(2);
                        const discount = Math.round(parseFloat(deal.savings));
                        const isLowest = parseFloat(steamPrice) <= parseFloat(lowestEver);

                        statusDiv.innerText = `Analizando: ${name}...`;

                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <div class="game-info">
                                <div class="game-title">${name}</div>
                                <span class="original-price">$${originalPrice}</span>
                                <span class="price-tag">$${steamPrice}</span>
                                <span>(-${discount}%)</span>
                                <div class="lowest">
                                    Mínimo histórico: $${lowestEver} 
                                    ${isLowest ? '⭐ ¡ES EL MÍNIMO HISTÓRICO!' : ''}
                                </div>
                            </div>
                            <div class="chart-container">
                                <canvas id="chart-${appId}"></canvas>
                            </div>
                        `;
                        resultsDiv.appendChild(card);

                        createTimelineChart(appId, name, steamPrice, lowestEver, originalPrice);
                        
                        await new Promise(r => setTimeout(r, 300));
                    }
                }
                
                statusDiv.innerText = dealsFound > 0 ? `✅ Se encontraron ${dealsFound} juegos en oferta.` : '❌ Ningún juego de tu wishlist está en oferta ahora mismo.';

            } catch (error) {
                statusDiv.innerHTML = `<span style="color: #ff0000;">Error: ${error.message}</span>`;
                console.error(error);
            }
        }

        function createTimelineChart(appId, name, currentPrice, lowestPrice, originalPrice) {
            const ctx = document.getElementById(`chart-${appId}`).getContext('2d');
            const labels = ['Lanzamiento', 'Rebaja Anterior', 'Mínimo Histórico', 'Precio Actual'];
            const dataPoints = [
                parseFloat(originalPrice), 
                (parseFloat(originalPrice) + parseFloat(lowestPrice)) / 2, 
                parseFloat(lowestPrice), 
                parseFloat(currentPrice)
            ];

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Precio (USD)', data: dataPoints,
                        borderColor: '#66c0f4', backgroundColor: 'rgba(102, 192, 244, 0.1)',
                        fill: true, tension: 0.3
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { ticks: { color: '#c7d5e0', callback: v => '$' + v }, grid: { color: '#3d5575' } },
                        x: { ticks: { color: '#c7d5e0' }, grid: { color: '#3d5575' } }
                    }
                }
            });
        }
    </script>
</body>
</html>
