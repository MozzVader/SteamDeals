<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WishlistDeals</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* ── Reset & Base ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0a;
            --bg-raised: #111111;
            --bg-input: #161616;
            --fg: #e0e0e0;
            --fg-dim: #777777;
            --accent: #00E205;
            --accent-dim: rgba(0, 226, 5, 0.12);
            --accent-glow: rgba(0, 226, 5, 0.25);
            --border: #222222;
            --danger: #ff4444;
            --warn: #f0ad4e;
            --blue: #66c0f4;
            --font: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            /* Dot grid 40px */
            background-image: radial-gradient(circle, #1a1a1a 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--fg);
            font-family: var(--font);
            min-height: 100vh;
        }

        /* ── Header ── */
        .header {
            background: var(--bg-raised);
            border-bottom: 1px solid var(--border);
            padding: 16px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            user-select: none;
            flex-shrink: 0;
        }

        .brand-icon {
            width: 32px;
            height: 32px;
        }

        .brand-text {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .brand-wishlist { color: #ffffff; }
        .brand-deals    { color: var(--accent); }

        /* ── Config row ── */
        .config-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: nowrap;
        }

        input {
            padding: 10px 14px;
            border-radius: 0;
            border: 1px solid var(--border);
            background: var(--bg-input);
            color: var(--fg);
            font-size: 14px;
            font-family: var(--font);
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent);
        }

        input::placeholder {
            color: var(--fg-dim);
        }

        .small-input {
            width: 54px;
            text-align: center;
            text-transform: uppercase;
        }

        button {
            padding: 10px 24px;
            border-radius: 0;
            border: none;
            background: var(--accent);
            color: #000;
            font-weight: 700;
            cursor: pointer;
            font-size: 15px;
            font-family: var(--font);
            transition: background 0.2s, box-shadow 0.2s;
            white-space: nowrap;
        }

        button:hover {
            background: #00ff06;
            box-shadow: 0 0 12px var(--accent-glow);
        }

        /* ── Main content ── */
        .main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 20px 60px;
        }

        #status {
            text-align: center;
            color: var(--fg-dim);
            font-style: italic;
            margin-bottom: 14px;
            font-size: 0.95rem;
        }

        /* ── Progress bar ── */
        .progress-container {
            width: 100%;
            background-color: var(--bg-raised);
            border: 1px solid var(--border);
            border-radius: 0;
            margin: 0 auto 20px auto;
            overflow: hidden;
            height: 22px;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--accent);
            width: 0%;
            transition: width 0.3s ease;
            text-align: center;
            font-size: 12px;
            line-height: 22px;
            color: #000;
            font-weight: 700;
        }

        /* ── Card ── */
        .card {
            background: var(--bg-raised);
            border: 1px solid var(--border);
            border-radius: 0;
            padding: 16px 20px;
            margin-bottom: 14px;
            display: flex;
            gap: 20px;
            align-items: center;
            transition: border-color 0.2s, box-shadow 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 16px var(--accent-dim);
        }

        .game-cover {
            width: 230px;
            height: auto;
            object-fit: cover;
            flex-shrink: 0;
            border: 1px solid var(--border);
        }

        .game-info { flex: 1; min-width: 0; }

        .game-title {
            color: var(--fg);
            font-size: 1.45rem;
            font-weight: 700;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .price-tag {
            font-size: 1.4rem;
            color: var(--accent);
            font-weight: 700;
        }

        .original-price {
            text-decoration: line-through;
            color: var(--fg-dim);
            font-size: 0.95rem;
            margin-right: 8px;
        }

        .discount-badge {
            font-size: 0.9rem;
            color: var(--warn);
            font-weight: 600;
        }

        .discount-info {
            color: var(--fg-dim);
            font-size: 0.85rem;
            margin-top: 8px;
        }

        .lowest-highlight {
            color: var(--accent);
            font-weight: 600;
        }

        /* ── Chart ── */
        .chart-container {
            flex-shrink: 0;
            width: 320px;
            height: 140px;
        }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .config-row {
                flex-wrap: wrap;
                width: 100%;
            }
            .config-row input {
                flex: 1;
                min-width: 120px;
            }
        }

        @media (max-width: 640px) {
            .card {
                flex-direction: column;
                gap: 12px;
            }
            .game-cover {
                width: 100%;
                max-height: 160px;
                object-fit: cover;
            }
            .chart-container {
                width: 100%;
            }
            .brand-text {
                font-size: 1.2rem;
            }
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <a class="brand" href="#">
            <svg class="brand-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="2" y="10" width="14" height="18" rx="2" stroke="#00E205" stroke-width="2.5"/>
                <rect x="20" y="10" width="14" height="18" rx="2" stroke="#00E205" stroke-width="2.5"/>
                <path d="M9 18L13 21L9 24" stroke="#00E205" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="27" cy="20" r="2.5" fill="#00E205"/>
            </svg>
            <span class="brand-text">
                <span class="brand-wishlist">WISHLIST</span><span class="brand-deals">DEALS</span>
            </span>
        </a>

        <div class="config-row">
            <input type="text" id="steamIdInput" placeholder="Tu Steam64 ID">
            <input type="text" id="apiKeyInput" placeholder="Tu Steam Web API Key">
            <input type="text" id="countryInput" class="small-input" value="ar" title="Código de país (ej: ar, us, es)">
            <button onclick="startTracking()">Buscar Ofertas</button>
        </div>
    </div>

    <!-- Content -->
    <div class="main">
        <div id="status"></div>
        <div class="progress-container" id="progress-container" style="display: none;">
            <div class="progress-bar" id="progress-bar">0%</div>
        </div>
        <div id="results"></div>
    </div>

    <script>
        const WORKER_URL = "https://steamdeals.mozz05.workers.dev/"; 

        window.onload = function() {
            if (localStorage.getItem('steamId')) document.getElementById('steamIdInput').value = localStorage.getItem('steamId');
            if (localStorage.getItem('steamApiKey')) document.getElementById('apiKeyInput').value = localStorage.getItem('steamApiKey');
            if (localStorage.getItem('steamCountry')) document.getElementById('countryInput').value = localStorage.getItem('steamCountry');
        };

        function chunkArray(array, size) {
            const result = [];
            for (let i = 0; i < array.length; i += size) {
                result.push(array.slice(i, i + size));
            }
            return result;
        }

        async function startTracking() {
            const steamId = document.getElementById('steamIdInput').value;
            const apiKey = document.getElementById('apiKeyInput').value;
            const cc = document.getElementById('countryInput').value.toLowerCase() || 'us';
            const resultsDiv = document.getElementById('results');
            const statusDiv = document.getElementById('status');
            const progressBar = document.getElementById('progress-bar');
            const progressContainer = document.getElementById('progress-container');

            if (!steamId || !apiKey) {
                statusDiv.innerText = "⚠️ Ingresá tu Steam ID y tu API Key para continuar.";
                return;
            }

            localStorage.setItem('steamId', steamId);
            localStorage.setItem('steamApiKey', apiKey);
            localStorage.setItem('steamCountry', cc);

            resultsDiv.innerHTML = '';
            progressContainer.style.display = 'block';
            progressBar.style.width = '0%';
            progressBar.innerText = '0%';
            statusDiv.innerText = 'Obteniendo tu wishlist...';

            try {
                const wishlistUrl = `${WORKER_URL}?mode=wishlist&steamid=${steamId}&apikey=${apiKey}`;
                const wishlistRes = await fetch(wishlistUrl);

                if (!wishlistRes.ok) throw new Error("Error obteniendo la wishlist.");

                const appIds = await wishlistRes.json();

                if (appIds.length === 0) {
                    statusDiv.innerText = "Wishlist vacía o perfil privado.";
                    progressContainer.style.display = 'none';
                    return;
                }

                statusDiv.innerText = `Se encontraron ${appIds.length} juegos. Buscando ofertas en ${cc.toUpperCase()}...`;

                const lotes = chunkArray(appIds, 10);
                let totalDeals = 0;

                for (let i = 0; i < lotes.length; i++) {
                    const lote = lotes[i];
                    const porcentaje = Math.round(((i + 1) / lotes.length) * 100);
                    progressBar.style.width = porcentaje + '%';
                    progressBar.innerText = porcentaje + '%';
                    statusDiv.innerText = `Analizando lote ${i + 1} de ${lotes.length}...`;

                    const dealsUrl = `${WORKER_URL}?mode=deals&appids=${lote.join(',')}&cc=${cc}`;
                    const dealsRes = await fetch(dealsUrl);

                    if (dealsRes.ok) {
                        const deals = await dealsRes.json();

                        deals.forEach(deal => {
                            totalDeals++;

                            const curr = deal.currency;
                            let discountText = "";
                            let isLowest = false;

                            if (deal.maxDiscountUs !== null) {
                                if (deal.discount >= deal.maxDiscountUs) {
                                    isLowest = true;
                                }
                                discountText = isLowest
                                    ? `Mejor descuento histórico: ${deal.maxDiscountUs}% — <span class="lowest-highlight">NUNCA ESTUVO TAN BARATO</span>`
                                    : `Mejor descuento histórico: ${deal.maxDiscountUs}%`;
                            } else {
                                discountText = `Descuento histórico: No disponible`;
                            }

                            const steamUrl = `https://store.steampowered.com/app/${deal.appId}`;
                            const imgUrl = `https://cdn.akamai.steamstatic.com/steam/apps/${deal.appId}/header.jpg`;

                            const card = document.createElement('a');
                            card.className = 'card';
                            card.href = steamUrl;
                            card.target = '_blank';
                            card.rel = 'noopener noreferrer';
                            card.title = `Ver ${deal.name} en Steam`;
                            card.innerHTML = `
                                <img class="game-cover" src="${imgUrl}" alt="${deal.name}" loading="lazy">
                                <div class="game-info">
                                    <div class="game-title">${deal.name}</div>
                                    <span class="original-price">${curr} $${deal.originalPrice}</span>
                                    <span class="price-tag">${curr} $${deal.steamPrice}</span>
                                    <span class="discount-badge">-${deal.discount}%</span>
                                    <div class="discount-info">${discountText}</div>
                                </div>
                                <div class="chart-container">
                                    <canvas id="chart-${deal.appId}"></canvas>
                                </div>
                            `;
                            resultsDiv.appendChild(card);

                            createTimelineChart(deal.appId, deal.name, deal.steamPrice, deal.lowestEverUsd, deal.originalPrice, curr, deal.discount, deal.maxDiscountUs);
                        });
                    }
                    if (i < lotes.length - 1) await new Promise(r => setTimeout(r, 500));
                }

                statusDiv.innerText = totalDeals > 0
                    ? `Búsqueda completada. ${totalDeals} juegos en oferta.`
                    : 'Búsqueda completada. Ningún juego está en oferta ahora mismo.';

            } catch (error) {
                statusDiv.innerHTML = `<span style="color: var(--danger);">Error: ${error.message}</span>`;
                console.error(error);
                progressContainer.style.display = 'none';
            }
        }

        function createTimelineChart(appId, name, currentPrice, lowestPriceUsd, originalPrice, currency, currentDiscount, maxDiscountUs) {
            const ctx = document.getElementById(`chart-${appId}`).getContext('2d');

            const safeLowest = lowestPriceUsd !== null ? parseFloat(lowestPriceUsd) : null;

            const dataPoints = [
                parseFloat(originalPrice),
                safeLowest !== null ? (parseFloat(originalPrice) + safeLowest) / 1.5 : parseFloat(currentPrice) * 1.2,
                safeLowest !== null ? safeLowest : parseFloat(currentPrice),
                parseFloat(currentPrice)
            ];

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Lanzamiento', 'Rebaja Anterior', 'Mínimo Histórico', 'Hoy'],
                    datasets: [{
                        label: 'Precio',
                        data: dataPoints,
                        borderColor: '#00E205',
                        backgroundColor: 'rgba(0, 226, 5, 0.08)',
                        fill: true,
                        tension: 0.3,
                        pointBackgroundColor: '#00E205',
                        pointBorderColor: '#00E205',
                        pointRadius: 3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: {
                            ticks: { color: '#777', callback: v => '$' + v },
                            grid: { color: '#1a1a1a' }
                        },
                        x: {
                            ticks: { color: '#777' },
                            grid: { color: '#1a1a1a' }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
