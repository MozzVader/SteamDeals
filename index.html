<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Wishlist Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #1b2838; color: #c7d5e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px;
        }
        .header { text-align: center; margin-bottom: 30px; }
        input {
            padding: 10px; width: 220px; border-radius: 5px;
            border: none; background: #2a475e; color: white; font-size: 14px; margin: 5px;
        }
        .small-input { width: 50px; text-align: center; text-transform: uppercase; }
        button {
            padding: 10px 20px; border-radius: 5px; border: none;
            background: #66c0f4; color: #1b2838; font-weight: bold; cursor: pointer; font-size: 16px;
        }
        button:hover { background: #a4d007; }
        a { color: #a4d007; }
        .card {
            background: #2a475e; border-radius: 8px; padding: 15px;
            margin-bottom: 20px; display: flex; gap: 20px; align-items: center;
        }
        .game-info { flex: 1; }
        .game-title { color: #66c0f4; font-size: 1.2rem; font-weight: bold; }
        .price-tag { font-size: 1.5rem; color: #a4d007; }
        .original-price { text-decoration: line-through; color: #626366; font-size: 1rem; }
        .discount-info { color: #f0ad4e; font-size: 0.9rem; margin-top: 5px; }
        .chart-container { flex: 1; min-width: 300px; height: 150px; }
        #status { text-align: center; color: #66c0f4; font-style: italic; margin-bottom: 10px; font-size: 1.1rem; }
        .progress-container {
            width: 80%; background-color: #2a475e; border-radius: 10px;
            margin: 0 auto 20px auto; overflow: hidden;
        }
        .progress-bar {
            height: 20px; background-color: #a4d007; width: 0%;
            transition: width 0.3s ease; text-align: center; font-size: 12px; line-height: 20px; color: black; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🎮 Mi Wishlist en Oferta</h1>
        <p>Configurá tu país para ver precios locales reales.</p>
        <input type="text" id="steamIdInput" placeholder="Tu Steam64 ID">
        <input type="text" id="apiKeyInput" placeholder="Tu Steam Web API Key">
        <input type="text" id="countryInput" class="small-input" value="ar" title="Código de país (ej: ar, us, es)">
        <br><br>
        <button onclick="startTracking()">Buscar Ofertas</button>
    </div>
    
    <div id="status"></div>
    <div class="progress-container" id="progress-container" style="display: none;">
        <div class="progress-bar" id="progress-bar">0%</div>
    </div>
    <div id="results"></div>

    <script>
        const WORKER_URL = "https://steamdeals.mozz05.workers.dev/"; 
        
        window.onload = function() {
            if (localStorage.getItem('steamId')) document.getElementById('steamIdInput').value = localStorage.getItem('steamId');
            if (localStorage.getItem('steamApiKey')) document.getElementById('apiKeyInput').value = localStorage.getItem('steamApiKey');
            if (localStorage.getItem('steamCountry')) document.getElementById('countryInput').value = localStorage.getItem('steamCountry');
        };

        function chunkArray(array, size) {
            const result = [];
            for (let i = 0; i < array.length; i += size) {
                result.push(array.slice(i, i + size));
            }
            return result;
        }

        async function startTracking() {
            const steamId = document.getElementById('steamIdInput').value;
            const apiKey = document.getElementById('apiKeyInput').value;
            const cc = document.getElementById('countryInput').value.toLowerCase() || 'us';
            const resultsDiv = document.getElementById('results');
            const statusDiv = document.getElementById('status');
            const progressBar = document.getElementById('progress-bar');
            const progressContainer = document.getElementById('progress-container');
            
            if (!steamId || !apiKey) {
                statusDiv.innerText = "⚠️ Por favor, introduce tu Steam ID y tu API Key.";
                return;
            }

            localStorage.setItem('steamId', steamId);
            localStorage.setItem('steamApiKey', apiKey);
            localStorage.setItem('steamCountry', cc);

            resultsDiv.innerHTML = '';
            progressContainer.style.display = 'block';
            progressBar.style.width = '0%';
            progressBar.innerText = '0%';
            statusDiv.innerText = 'Obteniendo tu wishlist...';

            try {
                const wishlistUrl = `${WORKER_URL}?mode=wishlist&steamid=${steamId}&apikey=${apiKey}`;
                const wishlistRes = await fetch(wishlistUrl);
                
                if (!wishlistRes.ok) throw new Error("Error obteniendo la wishlist.");
                
                const appIds = await wishlistRes.json();
                
                if (appIds.length === 0) {
                    statusDiv.innerText = "Wishlist vacía o perfil privado.";
                    progressContainer.style.display = 'none';
                    return;
                }

                statusDiv.innerText = `Se encontraron ${appIds.length} juegos. Buscando ofertas en ${cc.toUpperCase()}...`;

                // LOTES DE 10 PARA NO MATAR A CLOUDFLARE
                const lotes = chunkArray(appIds, 10);
                let totalDeals = 0;

                for (let i = 0; i < lotes.length; i++) {
                    const lote = lotes[i];
                    const porcentaje = Math.round(((i + 1) / lotes.length) * 100);
                    progressBar.style.width = porcentaje + '%';
                    progressBar.innerText = porcentaje + '%';
                    statusDiv.innerText = `Analizando lote ${i + 1} de ${lotes.length}...`;

                    const dealsUrl = `${WORKER_URL}?mode=deals&appids=${lote.join(',')}&cc=${cc}`;
                    const dealsRes = await fetch(dealsUrl);
                    
                    if (dealsRes.ok) {
                        const deals = await dealsRes.json();
                        
                        deals.forEach(deal => {
                            totalDeals++;
                            
                            const curr = deal.currency;
                            let discountText = "";
                            let isLowest = false;

                            // LÓGICA DE "MEJOR DESCUENTO HISTÓRICO"
                            if (deal.maxDiscountUs !== null) {
                                // Si mi descuento actual es mayor o igual al histórico de EE.UU.
                                if (deal.discount >= deal.maxDiscountUs) {
                                    isLowest = true;
                                }
                                discountText = `Mejor descuento histórico: ${deal.maxDiscountUs}% ${isLowest ? '⭐ ¡NUNCA ESTUVO TAN BARATO!' : ''}`;
                            } else {
                                discountText = `Descuento histórico: No disponible`;
                            }

                            const card = document.createElement('div');
                            card.className = 'card';
                            card.innerHTML = `
                                <div class="game-info">
                                    <div class="game-title">${deal.name}</div>
                                    <span class="original-price">${curr} $${deal.originalPrice}</span>
                                    <span class="price-tag">${curr} $${deal.steamPrice}</span>
                                    <span>(-${deal.discount}%)</span>
                                    <div class="discount-info">${discountText}</div>
                                </div>
                                <div class="chart-container">
                                    <canvas id="chart-${deal.appId}"></canvas>
                                </div>
                            `;
                            resultsDiv.appendChild(card);

                            createTimelineChart(deal.appId, deal.name, deal.steamPrice, deal.lowestEverUsd, deal.originalPrice, curr, deal.discount, deal.maxDiscountUs);
                        });
                    }
                    if (i < lotes.length - 1) await new Promise(r => setTimeout(r, 500));
                }

                statusDiv.innerText = totalDeals > 0 ? `✅ Búsqueda completada. Encontrados ${totalDeals} juegos en oferta.` : '❌ Búsqueda completada. Ningún juego está en oferta ahora mismo.';

            } catch (error) {
                statusDiv.innerHTML = `<span style="color: #ff0000;">Error: ${error.message}</span>`;
                console.error(error);
                progressContainer.style.display = 'none';
            }
        }

        function createTimelineChart(appId, name, currentPrice, lowestPriceUsd, originalPrice, currency, currentDiscount, maxDiscountUs) {
            const ctx = document.getElementById(`chart-${appId}`).getContext('2d');
            
            const safeLowest = lowestPriceUsd !== null ? parseFloat(lowestPriceUsd) : null;
            
            // Simulamos la línea de tiempo basada en los descuentos
            const dataPoints = [
                parseFloat(originalPrice), 
                safeLowest !== null ? (parseFloat(originalPrice) + safeLowest) / 1.5 : parseFloat(currentPrice) * 1.2, 
                safeLowest !== null ? safeLowest : parseFloat(currentPrice), 
                parseFloat(currentPrice)
            ];

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Lanzamiento', 'Rebaja Anterior', 'Mínimo Histórico', 'Hoy'],
                    datasets: [{
                        label: `Precio`, data: dataPoints,
                        borderColor: '#66c0f4', backgroundColor: 'rgba(102, 192, 244, 0.1)',
                        fill: true, tension: 0.3
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { ticks: { color: '#c7d5e0', callback: v => '$' + v }, grid: { color: '#3d5575' } },
                        x: { ticks: { color: '#c7d5e0' }, grid: { color: '#3d5575' } }
                    }
                }
            });
        }
    </script>
</body>
</html>
