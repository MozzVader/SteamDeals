<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Wishlist Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #1b2838; color: #c7d5e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px;
        }
        .header { text-align: center; margin-bottom: 30px; }
        input {
            padding: 10px; width: 300px; border-radius: 5px;
            border: none; background: #2a475e; color: white; font-size: 14px; margin: 5px;
        }
        button {
            padding: 10px 20px; border-radius: 5px; border: none;
            background: #66c0f4; color: #1b2838; font-weight: bold; cursor: pointer; font-size: 16px;
        }
        button:hover { background: #a4d007; }
        a { color: #a4d007; }
        .card {
            background: #2a475e; border-radius: 8px; padding: 15px;
            margin-bottom: 20px; display: flex; gap: 20px; align-items: center;
        }
        .game-info { flex: 1; }
        .game-title { color: #66c0f4; font-size: 1.2rem; font-weight: bold; }
        .price-tag { font-size: 1.5rem; color: #a4d007; }
        .original-price { text-decoration: line-through; color: #626366; font-size: 1rem; }
        .lowest { color: #f0ad4e; font-size: 0.9rem; margin-top: 5px; }
        .chart-container { flex: 1; min-width: 300px; height: 150px; }
        #status { text-align: center; color: #66c0f4; font-style: italic; margin-bottom: 10px; font-size: 1.1rem; }
        
        /* Estilos de la barra de progreso */
        .progress-container {
            width: 80%; background-color: #2a475e; border-radius: 10px;
            margin: 0 auto 20px auto; overflow: hidden; display: none;
        }
        .progress-bar {
            height: 20px; background-color: #a4d007; width: 0%;
            transition: width 0.5s ease; text-align: center; font-size: 12px; line-height: 20px; color: black; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🎮 Mi Wishlist en Oferta</h1>
        <p>Necesitamos tu ID y tu <a href="https://steamcommunity.com/dev/apikey" target="_blank">API Key de Steam</a> (es gratis).</p>
        <input type="text" id="steamIdInput" value="76561198043893385" placeholder="Tu Steam64 ID">
        <input type="text" id="apiKeyInput" placeholder="Pega tu Steam Web API Key aquí">
        <br><br>
        <button onclick="startTracking()">Buscar Ofertas</button>
    </div>
    
    <div id="status"></div>
    <div class="progress-container" id="progress-container">
        <div class="progress-bar" id="progress-bar">0%</div>
    </div>
    <div id="results"></div>

    <script>
        // PEGA AQUÍ LA URL DE TU WORKER
        const WORKER_URL = "https://steamdeals.mozz05.workers.dev/"; 
        
        async function startTracking() {
            const steamId = document.getElementById('steamIdInput').value;
            const apiKey = document.getElementById('apiKeyInput').value;
            const resultsDiv = document.getElementById('results');
            const statusDiv = document.getElementById('status');
            const progressContainer = document.getElementById('progress-container');
            const progressBar = document.getElementById('progress-bar');
            
            if (!steamId || !apiKey) {
                statusDiv.innerText = "⚠️ Por favor, introduce tu Steam ID y tu API Key.";
                return;
            }

            resultsDiv.innerHTML = '';
            statusDiv.innerText = 'Conectando con la API Oficial de Steam...';
            progressContainer.style.display = 'block';
            progressBar.style.width = '0%';
            progressBar.innerText = '0%';

            try {
                // Llamamos a nuestro Worker que usa la API oficial
                const fetchUrl = `${WORKER_URL}?steamid=${steamId}&apikey=${apiKey}`;
                const response = await fetch(fetchUrl);
                
                if (!response.ok) throw new Error("Error en el Worker.");

                const appIds = await response.json();

                if (!appIds || appIds.length === 0) {
                    throw new Error("Wishlist vacía o la API Key no tiene permisos sobre este perfil.");
                }

                let dealsFound = 0;

                for (let i = 0; i < appIds.length; i++) {
                    const appId = appIds[i];
                    
                    // Actualizamos la barra de progreso
                    const porcentaje = Math.round(((i + 1) / appIds.length) * 100);
                    progressBar.style.width = porcentaje + '%';
                    progressBar.innerText = porcentaje + '%';
                    statusDiv.innerText = `Revisando juego ${i + 1} de ${appIds.length}...`;

                    const cheapSharkUrl = `https://www.cheapshark.com/api/1.0/deals?storeID=1&steamAppID=${appId}`;
                    
                    try {
                        const csResponse = await fetch(cheapSharkUrl);
                        
                        // Si CheapShark nos bloquea por hacer muchas peticiones, esperamos 3 segundos y reintentamos
                        if (csResponse.status === 429) {
                            statusDiv.innerText = "Límite de peticiones alcanzado. Esperando 3 segundos...";
                            await new Promise(r => setTimeout(r, 3000));
                            const retryResponse = await fetch(cheapSharkUrl);
                            if (!retryResponse.ok) continue; // Si falla de nuevo, saltamos el juego
                            var csData = await retryResponse.json();
                        } else {
                            var csData = await csResponse.json();
                        }

                        // Si CheapShark tiene datos y está en descuento
                        if (csData && csData.length > 0 && parseFloat(csData[0].savings) > 0) {
                            const deal = csData[0];
                            dealsFound++;
                            
                            const name = deal.title;
                            const steamPrice = parseFloat(deal.salePrice).toFixed(2);
                            const originalPrice = parseFloat(deal.normalPrice).toFixed(2);
                            const lowestEver = parseFloat(deal.lowestPrice).toFixed(2);
                            const discount = Math.round(parseFloat(deal.savings));
                            const isLowest = parseFloat(steamPrice) <= parseFloat(lowestEver);

                            const card = document.createElement('div');
                            card.className = 'card';
                            card.innerHTML = `
                                <div class="game-info">
                                    <div class="game-title">${name}</div>
                                    <span class="original-price">$${originalPrice}</span>
                                    <span class="price-tag">$${steamPrice}</span>
                                    <span>(-${discount}%)</span>
                                    <div class="lowest">
                                        Mínimo histórico: $${lowestEver} 
                                        ${isLowest ? '⭐ ¡ES EL MÍNIMO HISTÓRICO!' : ''}
                                    </div>
                                </div>
                                <div class="chart-container">
                                    <canvas id="chart-${appId}"></canvas>
                                </div>
                            `;
                            resultsDiv.appendChild(card);

                            createTimelineChart(appId, name, steamPrice, lowestEver, originalPrice);
                        }
                    } catch (err) {
                        console.error("Error con el juego ID " + appId, err);
                    }
                    
                    // PAUSA FUNDAMENTAL: 1.2 segundos para no hacer enojar a CheapShark
                    await new Promise(r => setTimeout(r, 1200));
                }
                
                statusDiv.innerText = dealsFound > 0 ? `✅ Búsqueda completada. Se encontraron ${dealsFound} juegos en oferta.` : '❌ Búsqueda completada. Ningún juego de tu wishlist está en oferta ahora mismo.';
                progressBar.style.width = '100%';
                progressBar.innerText = '100%';

            } catch (error) {
                statusDiv.innerHTML = `<span style="color: #ff0000;">Error: ${error.message}</span>`;
                progressContainer.style.display = 'none';
                console.error(error);
            }
        }

        function createTimelineChart(appId, name, currentPrice, lowestPrice, originalPrice) {
            const ctx = document.getElementById(`chart-${appId}`).getContext('2d');
            const labels = ['Lanzamiento', 'Rebaja Anterior', 'Mínimo Histórico', 'Precio Actual'];
            const dataPoints = [
                parseFloat(originalPrice), 
                (parseFloat(originalPrice) + parseFloat(lowestPrice)) / 2, 
                parseFloat(lowestPrice), 
                parseFloat(currentPrice)
            ];

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Precio (USD)', data: dataPoints,
                        borderColor: '#66c0f4', backgroundColor: 'rgba(102, 192, 244, 0.1)',
                        fill: true, tension: 0.3
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { ticks: { color: '#c7d5e0', callback: v => '$' + v }, grid: { color: '#3d5575' } },
                        x: { ticks: { color: '#c7d5e0' }, grid: { color: '#3d5575' } }
                    }
                }
            });
        }
    </script>
</body>
</html>
